cat > /home/claude/build-apk.yml << 'EOF'
name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Extract zip
        run: |
          unzip stepsync.zip -d project
          echo "PROJECT_ROOT=project" >> $GITHUB_ENV
          echo "Isi folder:"
          ls project/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        working-directory: ${{ env.PROJECT_ROOT }}
        run: gradle wrapper --gradle-version 8.14

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_ROOT }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StepSync-debug-apk
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
EOF
